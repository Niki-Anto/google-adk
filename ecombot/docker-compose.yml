version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ecombot
      POSTGRES_PASSWORD: super_user
    ports:
      - "5431:5432"
    volumes:
      # Mounts local init-db.sql into Postgres's auto-init directory.
      # Any .sql file here runs automatically on first container startup.
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
